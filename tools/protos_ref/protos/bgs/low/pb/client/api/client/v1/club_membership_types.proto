syntax = "proto2";

package bgs.protocol.club_membership.v1.client;

import "bgs/low/pb/client/api/common/v1/club_type.proto";
import "bgs/low/pb/client/api/client/v1/club_member.proto";
import "bgs/low/pb/client/api/client/v1/club_invitation.proto";
import "bgs/low/pb/client/api/common/v1/club_core.proto";
import "bgs/low/pb/client/event_view_types.proto";
import "bgs/low/pb/client/rpc_types.proto";

message ClubMembershipFilter {
  optional .bgs.protocol.club.v1.MemberId member_id = 1;
  optional .bgs.protocol.club.v1.UniqueClubType type = 2;
}

message ClubMembershipSubscribeOptions {
  repeated .bgs.protocol.club_membership.v1.client.ClubMembershipFilter filter = 1;
}

message ClubMembershipGetStateOptions {
  repeated .bgs.protocol.club_membership.v1.client.ClubMembershipFilter filter = 1;
}

message ClubMembershipDescription {
  optional .bgs.protocol.club.v1.MemberId member_id = 1;
  optional .bgs.protocol.club.v1.ClubDescription club = 2;
}

message ClubMembershipState {
  repeated .bgs.protocol.club_membership.v1.client.ClubMembershipDescription description = 1;
  repeated .bgs.protocol.club.v1.client.ClubInvitation invitation = 2;
  optional .bgs.protocol.club_membership.v1.client.ClubSharedSettings setting = 3;
  optional .bgs.protocol.ViewMarker mention_view = 4;
}

message ClubPosition {
  repeated uint64 club_id = 1;
}

message ClubSharedSettings {
  optional .bgs.protocol.club_membership.v1.client.ClubPosition club_position = 1;
}

message ClubSharedSettingsOptions {
  optional .bgs.protocol.club_membership.v1.client.ClubPosition club_position = 1;
}

message ClubSharedSettingsAssignment {
  optional .bgs.protocol.club_membership.v1.client.ClubPosition club_position = 1;
}

